server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressione gzip per ottimizzare i file statici
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Regola fondamentale per le Single Page Application:
    # Se un file o una directory non esiste, rimanda tutto a index.html
    # In questo modo react-router gestisce gli URL virtuali
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache per file statici (immagini, js, css)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
